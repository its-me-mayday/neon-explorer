<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Explorer 3D - Wraith Interceptor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; }
      #app { width: 100vw; height: 100vh; }
      
      /* HUD CONTAINER */
      #hud {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        color: #00ffff;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* CROSSHAIR */
      .crosshair {
        position: absolute;
        top: 50%; left: 50%;
        width: 40px; height: 40px;
        border: 1px solid rgba(0, 255, 255, 0.3);
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .crosshair::before {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 4px; height: 4px;
        background: #00ffff;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        box-shadow: 0 0 10px #00ffff;
      }

      /* SPEEDOMETER */
      .stats-left {
        position: absolute;
        bottom: 40px; left: 40px;
        border-left: 4px solid #00ffff;
        padding-left: 15px;
      }
      .speed-label { font-size: 0.8rem; opacity: 0.7; }
      .speed-value { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 700; }

      /* TURBO BAR */
      .turbo-container {
        position: absolute;
        bottom: 40px; right: 40px;
        text-align: right;
      }
      .turbo-label { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }
      .turbo-bar-bg {
        width: 200px; height: 10px;
        background: rgba(0, 255, 255, 0.1);
        border: 1px solid rgba(0, 255, 255, 0.3);
        overflow: hidden;
      }
      #turbo-fill {
        width: 100%; height: 100%;
        background: #00ffff;
        box-shadow: 0 0 15px #00ffff;
        transition: width 0.1s ease;
      }

      /* TOP INFO */
      .top-info {
        position: absolute;
        top: 30px; width: 100%;
        display: flex; justify-content: space-between;
        padding: 0 40px; box-sizing: border-box;
      }
      .system-status { font-size: 0.9rem; }
      .glitch-text { animation: blink 2s infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    
    <div id="hud">
      <div class="crosshair"></div>
      
      <div class="top-info">
        <div class="system-status">
          [ UNIT: WRAITH-INTERCEPTOR ]<br>
          [ SECTOR: DEEP-SPACE-09 ]
        </div>
        <div class="system-status glitch-text">
          SYSTEM STATUS: OPTIMAL
        </div>
      </div>

      <div class="stats-left">
        <div class="speed-label">Velocity (KM/S)</div>
        <div class="speed-value" id="speed-display">000</div>
      </div>

      <div class="turbo-container">
        <div class="turbo-label">Quantum Boost</div>
        <div class="turbo-bar-bg">
          <div id="turbo-fill"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
